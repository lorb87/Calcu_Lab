<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Calcu Lab - Sistema de gestión de pedidos y rutas">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Calcu Lab</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#000;
  --text:#fff;
  --input:#444;
  --border:#333;
}
.light{
  --bg:#fff;
  --text:#000;
  --input:#ddd;
  --border:#bbb;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
  max-width:1400px;
  margin:0 auto;
}
.logo-center{
  display:block;
  margin:10px auto 5px auto;
  width:140px;
  max-width:80%;
}


header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:10px;
}

.left{
  display:flex;
  flex-direction:column;
  gap:5px;
}

#logo{
  width:200px;
  height:auto;
  max-width:100%;
}

button,input,select{
  background:var(--input);
  color:var(--text);
  border:none;
  padding:6px;
  box-sizing:border-box;
}

input, select{
  width:100%;
  margin-bottom:8px;
}

.section{
  border:1px solid var(--border);
  margin-top:15px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  overflow-x:auto;
  display:block;
}

@media (min-width: 768px) {
  table{
    display:table;
  }
}

th,td{
  border:1px solid var(--border);
  padding:5px;
  text-align:center;
  font-size:12px;
}

@media (min-width: 768px) {
  th,td{
    font-size:14px;
    padding:8px;
  }
}

.negativa{
  color:red;
  font-weight:bold;
}

.btn-neon{
  background:#000;
  border:2px solid var(--neon-color);
  color:var(--neon-color);
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
  text-shadow:0 0 5px var(--neon-color), 0 0 10px var(--neon-color);
  box-shadow:0 0 5px var(--neon-color), 0 0 10px var(--neon-color), inset 0 0 5px rgba(0,0,0,0.5);
  transition:all 0.3s;
  border-radius:3px;
  margin:2px;
  white-space:nowrap;
}

.btn-neon:hover{
  text-shadow:0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
  box-shadow:0 0 10px var(--neon-color), 0 0 20px var(--neon-color), inset 0 0 10px rgba(0,0,0,0.5);
}

.btn-neon:active{
  transform:scale(0.95);
}

.controls-group{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:15px;
}

@media (min-width: 768px) {
  .controls-group{
    flex-direction:row;
    flex-wrap:wrap;
  }
  .controls-group input,
  .controls-group select{
    width:auto;
    flex:1;
    min-width:150px;
  }
}

.button-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:10px;
}

.client-header{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#10b981;
  color:#fff;
  padding:15px 25px;
  border-radius:8px;
  box-shadow:0 0 20px rgba(16,185,129,0.5);
  z-index:9999;
  font-weight:bold;
  animation:slideUp 0.3s ease;
}

@keyframes slideUp{
  from{
    bottom:-100px;
    opacity:0;
  }
  to{
    bottom:20px;
    opacity:1;
  }
}
</style>
</head>

<body>

<header>
  <div class="left">
        
  </div>

  <button class="btn-neon" style="--neon-color:#00d9ff;" onclick="toggleTema()">Tema</button>
</header>
<img src="logo.png" id="logo" class= "logo-center">

<h1 style="text-align:center">Calcu Lab</h1>
<h2 style="text-align:center;font-size:14px;opacity:.7">by Capsu Lab</h2>

<hr>

<div class="controls-group">
  <label>Ruta del día</label>
  <select id="dia" onchange="actualizarClientes()">
    <option value="lunes">Lunes</option>
    <option value="martes">Martes</option>
    <option value="miercoles">Miércoles</option>
    <option value="jueves">Jueves</option>
    <option value="viernes">Viernes</option>
    <option value="sabado">Sábado</option>
    <option value="domingo">Domingo</option>
  </select>
</div>

<div class="controls-group">
  <label>Cliente</label>
  <select id="cliente" style="font-weight:bold;font-size:14px;"></select>
  <input id="nuevoCliente" placeholder="Nuevo cliente" onkeypress="if(event.key==='Enter'){agregarPedido();productoI.focus();}">
</div>

<hr>

<div class="controls-group">
  <input id="producto" placeholder="Producto">
  <input id="costo" type="number" placeholder="Precio compra $">
  <input id="precio" type="number" placeholder="Precio venta $">
  <input id="cantidad" type="number" placeholder="Cantidad" onkeypress="if(event.key==='Enter'){agregarPedido();productoI.focus();}">
</div>

<button class="btn-neon" style="--neon-color:#10b981;" onclick="agregarPedido()">Agregar pedido</button>

<div id="resultados"></div>

<hr>

<div class="button-group">
  <button class="btn-neon" style="--neon-color:#f59e0b;" onclick="gananciaDia()">Ganancia del día</button>
  <button class="btn-neon" style="--neon-color:#f59e0b;" onclick="gananciaSemana()">Ganancia semana</button>
  <button class="btn-neon" style="--neon-color:#ec4899;" onclick="mostrarOpcionesReporte()">Reporte Ganancias PDF</button>
</div>

<div id="ganancias"></div>

<hr>

<div id="rutas"></div>

<script>
// shortcuts
const diaSel=document.getElementById("dia");
const cliente=document.getElementById("cliente");
const nuevoCliente=document.getElementById("nuevoCliente");
const productoI=document.getElementById("producto");
const costoI=document.getElementById("costo");
const precioI=document.getElementById("precio");
const cantidadI=document.getElementById("cantidad");
const jsPDF = window.jspdf.jsPDF;

function init(){
  if(!localStorage.getItem("rutas")){
    localStorage.setItem("rutas",JSON.stringify({
      lunes:[],martes:[],miercoles:[],jueves:[],viernes:[],sabado:[],domingo:[]
    }));
  }
 
  actualizarClientes();
  render();
}
init();

function toggleTema(){
  document.body.classList.toggle("light");
}

function mostrarToast(mensaje){
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = mensaje;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideUp 0.3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function getData(){
  return JSON.parse(localStorage.getItem("rutas"));
}
function saveData(d){
  localStorage.setItem("rutas",JSON.stringify(d));
}

function actualizarClientes(){
  const dia=document.getElementById("dia").value;
  const sel=document.getElementById("cliente");
  sel.innerHTML="";
  getData()[dia].forEach(c=>{
    sel.innerHTML+=`<option>${c.nombre}</option>`;
  });
}

function agregarPedido(){
  const dia=diaSel.value;
  const nuevo=nuevoCliente.value.trim();
  const nombre=nuevo||cliente.value;
  if(!nombre) return;

  const data=getData();
  let c=data[dia].find(x=>x.nombre===nombre);
  if(!c){
    c={nombre,fecha:new Date().toISOString().split("T")[0],pedidos:[]};
    data[dia].push(c);
  }

  const costo=+costoI.value, precio=+precioI.value, cant=+cantidadI.value;
  
  // Si solo se ingresó el nombre del cliente pero no hay datos del producto, solo crear el cliente
  if(!productoI.value || !costo || !precio || !cant){
    saveData(data);
    nuevoCliente.value="";
    actualizarClientes();
    // Seleccionar el cliente recién agregado
    cliente.value = nombre;
    return;
  }
  
  c.pedidos.push({producto:productoI.value,costo,precio,cantidad:cant});

  saveData(data);
  nuevoCliente.value="";
  productoI.value="";
  costoI.value="";
  precioI.value="";
  cantidadI.value="";
  actualizarClientes();
  // Seleccionar el cliente recién agregado o actualizado
  cliente.value = nombre;
  render();
}

function render(){
  const data=getData();
  let html="";
  for(const d in data){
    html+=`<div class="section">
    <div class="section-header">
      <h3 style="margin:0;">Ruta ${d}</h3>
      <button class="btn-neon" style="--neon-color:#ef4444;" onclick="resetearDia('${d}')">Resetear ${d}</button>
    </div>`;
    data[d].forEach((c, clienteIdx) =>{
      // Calcular total del pedido del cliente
      let totalPedido = 0;
      c.pedidos.forEach(p => {
        if(!p.eliminado) totalPedido += p.precio * p.cantidad;
      });
      
      html+=`<div class="client-header">
        <b>${c.nombre}</b>
        <button class="btn-neon" style="--neon-color:#8b5cf6;" onclick="pdf('${d}','${c.nombre}')">Nota PDF</button>
      </div>
      <table>
      <tr><th>Producto</th><th>Precio compra</th><th>Precio venta</th><th>Cant</th><th>Gan/U</th><th>Gan/T</th><th>Acción</th></tr>`;
      c.pedidos.forEach((p, pedidoIdx)=>{
        const gu=p.precio-p.costo, gt=gu*p.cantidad;
        const estiloFila = p.eliminado ? 'opacity:0.4;text-decoration:line-through;' : '';
        const colorBoton = p.eliminado ? '#a855f7' : '#ef4444';
        const textoBoton = p.eliminado ? 'Restaurar' : 'Eliminar';
        
        html+=`<tr style="${estiloFila}">
          <td>${p.producto}</td>
          <td>$${p.costo}</td>
          <td>$${p.precio}</td>
          <td>${p.cantidad}</td>
          <td>${gu}</td>
          <td class="${gt<0?'negativa':''}">${gt}</td>
          <td>
            <button class="btn-neon" style="--neon-color:${colorBoton};" onclick="toggleProducto('${d}', ${clienteIdx}, ${pedidoIdx})">
              ${textoBoton}
            </button>
          </td>
        </tr>`;
      });
      html+=`<tr style="background:var(--input);font-weight:bold;">
        <td colspan="6" style="text-align:right;">TOTAL PEDIDO:</td>
        <td>$${totalPedido}</td>
      </tr>`;
      html+=`</table>`;
    });
    html+="</div>";
  }
  rutas.innerHTML=html;
}

function toggleProducto(dia, clienteIdx, pedidoIdx){
  const data=getData();
  const pedido = data[dia][clienteIdx].pedidos[pedidoIdx];
  pedido.eliminado = !pedido.eliminado;
  saveData(data);
  render();
}

function formatearFecha(fechaISO) {
  const fecha = new Date(fechaISO + 'T00:00:00');
  const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
  const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  
  const nombreDia = dias[fecha.getDay()];
  const dia = fecha.getDate();
  const mes = meses[fecha.getMonth()];
  const año = fecha.getFullYear();
  
  return `${nombreDia} ${dia} de ${mes} de ${año}`;
}

function numeroALetras(num) {
  const unidades = ['', 'UN', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
  const decenas = ['', '', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];
  const especiales = ['DIEZ', 'ONCE', 'DOCE', 'TRECE', 'CATORCE', 'QUINCE', 'DIECISÉIS', 'DIECISIETE', 'DIECIOCHO', 'DIECINUEVE'];
  const centenas = ['', 'CIENTO', 'DOSCIENTOS', 'TRESCIENTOS', 'CUATROCIENTOS', 'QUINIENTOS', 'SEISCIENTOS', 'SETECIENTOS', 'OCHOCIENTOS', 'NOVECIENTOS'];

  if (num === 0) return 'CERO PESOS';
  if (num === 100) return 'CIEN PESOS';

  let entero = Math.floor(num);
  let decimales = Math.round((num - entero) * 100);
  
  function convertirGrupo(n) {
    if (n === 0) return '';
    if (n < 10) return unidades[n];
    if (n < 20) return especiales[n - 10];
    if (n < 100) {
      let d = Math.floor(n / 10);
      let u = n % 10;
      if (u === 0) return decenas[d];
      if (d === 2) return 'VEINTI' + unidades[u];
      return decenas[d] + ' Y ' + unidades[u];
    }
    let c = Math.floor(n / 100);
    let resto = n % 100;
    return centenas[c] + (resto > 0 ? ' ' + convertirGrupo(resto) : '');
  }

  function convertirMiles(n) {
    if (n < 1000) return convertirGrupo(n);
    let miles = Math.floor(n / 1000);
    let resto = n % 1000;
    let textoMiles = miles === 1 ? 'MIL' : convertirGrupo(miles) + ' MIL';
    return textoMiles + (resto > 0 ? ' ' + convertirGrupo(resto) : '')
  }

  let texto = convertirMiles(entero) + ' PESOS';
  if (decimales > 0) {
    texto += ' ' + decimales.toString().padStart(2, '0') + '/100 M.N.';
  }
  
  return texto;
}

function pdf(dia, nombre) {
  const c = getData()[dia].find(x => x.nombre === nombre);
  const doc = new jsPDF();

  // Configuración general - estilo monocromático vintage
  doc.setFont("courier");
  
  // Borde superior decorativo estilo años 70
  let y = 15;
  doc.setFontSize(8);
  doc.text('=========================================================', 15, y);
  
  y += 8;
  
  // Logo/Nombre de la empresa en ASCII art style
  doc.setFontSize(16);
  doc.setFont("courier", "bold");
  doc.text('Capsu Lab', 105, y, { align: 'center' });
  
  y += 8;
  doc.setFontSize(10);
  doc.setFont("courier", "normal");
  doc.text('** NOTA DE PEDIDO **', 105, y, { align: 'center' });
  
  y += 6;
  doc.setFontSize(8);
  doc.text('=========================================================', 15, y);
  
  y += 10;
  
  // Información del pedido
  doc.setFontSize(9);
  doc.setFont("courier", "normal");
  doc.text(`FECHA: ${formatearFecha(c.fecha)}`, 20, y);
  y += 6;
  doc.text(`CLIENTE: ${c.nombre.toUpperCase()}`, 20, y);
  
  y += 8;
  doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
  
  y += 8;
  
  // Encabezados de productos (estilo tabla de máquina de escribir)
  doc.setFont("courier", "bold");
  doc.text('Descripción', 20, y);
  doc.text('Cantidad', 120, y);
  doc.text('Prec.Unitario', 145, y);
  doc.text('Total', 185, y);
  
  y += 4;
  doc.setFont("courier", "normal");
  doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
  
  y += 6;
  
  let total = 0;
  let cantidadTotal = 0;

  // Listar productos
  c.pedidos.forEach((pedido) => {
    // Saltar productos eliminados
    if(pedido.eliminado) return;
    
    const subtotal = pedido.precio * pedido.cantidad;
    total += subtotal;
    cantidadTotal += pedido.cantidad;

    // Nombre del producto (truncar si es muy largo)
    let producto = pedido.producto.substring(0, 25);
    doc.text(producto, 20, y);
    
    // Cantidad
    doc.text(pedido.cantidad.toString(), 125, y, { align: 'center' });
    
    // Precio unitario
    doc.text(`$${pedido.precio.toFixed(2)}`, 160, y, { align: 'right' });
    
    // Subtotal
    doc.text(`$${subtotal.toFixed(2)}`, 195, y, { align: 'right' });
    
    y += 6;
    
    // Control de página
    if (y > 260) {
      doc.addPage();
      y = 20;
      doc.setFont("courier", "bold");
      doc.text('Descripción', 20, y);
      doc.text('Cantidad', 120, y);
      doc.text('Prec.Unitario', 145, y);
      doc.text('Total', 175, y);
      y += 4;
      doc.setFont("courier", "normal");
      doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
      y += 6;
    }
  });

  y += 2;
  doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
  
  y += 8;

  // Total de piezas
  doc.setFont("courier", "bold");
  doc.text(`Piezas totales:`, 20, y);
  doc.text(cantidadTotal.toString(), 126, y, { align: 'right' });
  
  y += 8;

  // Total con efecto vintage
  doc.setFontSize(11);
  doc.text('=========================================================', 15, y);
  y += 7;
  doc.setFontSize(12);
  doc.text('TOTAL A PAGAR:', 80, y);
  doc.text(`$ ${total.toFixed(2)}`, 195, y, { align: 'right' });
  y += 2;
  doc.setFontSize(11);
  doc.text('=========================================================', 15, y);
  
  y += 10;

  // Total con letra
  doc.setFontSize(11);
  doc.setFont("courier", "normal");
  const totalLetras = numeroALetras(total);
  const palabras = totalLetras.split(' ');
  let linea = '';
  let lineas = [];
  
  palabras.forEach(palabra => {
    if ((linea + palabra).length > 65) {
      lineas.push(linea.trim());
      linea = palabra + ' ';
    } else {
      linea += palabra + ' ';
    }
  });
  if (linea.trim()) lineas.push(linea.trim());
  
  doc.text('SON:', 20, y);
  lineas.forEach((l, i) => {
    doc.text(l, 20, y + 4 + (i * 4));
  });
  
  y += 4 + (lineas.length * 4) + 6;

  // Separador
  doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
  
  y += 8;

  // Disclaimer fiscal estilo vintage
  doc.setFontSize(6);
  doc.setFont("courier", "italic");
  doc.text('* ESTE DOCUMENTO NO ES UN COMPROBANTE FISCAL *', 105, y, { align: 'center' });
  y += 4;
  doc.text('', 105, y, { align: 'center' });
  
  y += 8;
  doc.setFontSize(8);
  doc.text('=========================================================', 15, y);
  
  y += 6;
  doc.setFont("courier", "normal");
  doc.text('GRACIAS POR SU PREFERENCIA --- Capsu Lab. Mejores Precios.', 105, y + 2, { align: 'center' });
  y += 4;
  doc.setFontSize(8);
  doc.text('=========================================================', 15, y);

  doc.save(`Nota_${c.nombre}_${c.fecha}.pdf`);
  mostrarToast('✅ PDF generado correctamente');
}

function gananciaDia(){
  const d=diaSel.value;
  let t=0;
  getData()[d].forEach(c=>c.pedidos.forEach(p=>{
    if(!p.eliminado) t+=(p.precio-p.costo)*p.cantidad;
  }));
  ganancias.innerText=`Ganancia del día: $${t}`;
}

function gananciaSemana(){
  let t=0;
  Object.values(getData()).forEach(d=>d.forEach(c=>c.pedidos.forEach(p=>{
    if(!p.eliminado) t+=(p.precio-p.costo)*p.cantidad;
  })));
  ganancias.innerText=`Ganancia semanal: $${t}`;
}

function mostrarOpcionesReporte(){
  const opciones = `
¿Qué tipo de reporte deseas generar?

1 - Reporte por PRODUCTO (todos los productos con ganancia)
2 - Reporte por DÍA (detalle del día seleccionado)
3 - Reporte por SEMANA (resumen completo)
4 - PRODUCTOS MÁS VENDIDOS (ranking por cantidad)

Ingresa el número (1, 2, 3 o 4):`;
  
  const opcion = prompt(opciones);
  
  if(opcion === '1') generarReportePDF('producto');
  else if(opcion === '2') generarReportePDF('dia');
  else if(opcion === '3') generarReportePDF('semana');
  else if(opcion === '4') generarReportePDF('mas_vendidos');
  else if(opcion) alert('Opción no válida');
}

function generarReportePDF(tipo){
  const doc = new jsPDF();
  const data = getData();
  doc.setFont("courier");
  
  let y = 15;
  
  // Encabezado
  doc.setFontSize(8);
  doc.text('=========================================================', 15, y);
  y += 8;
  doc.setFontSize(16);
  doc.setFont("courier", "bold");
  doc.text('Capsu Lab', 105, y, { align: 'center' });
  y += 8;
  doc.setFontSize(10);
  doc.setFont("courier", "normal");
  
  if(tipo === 'producto'){
    doc.text('** REPORTE DE GANANCIAS POR PRODUCTO **', 105, y, { align: 'center' });
    y += 6;
    doc.setFontSize(8);
    doc.text('=========================================================', 15, y);
    y += 10;
    
    // Recopilar todos los productos
    const productos = {};
    Object.values(data).forEach(dia => {
      dia.forEach(cliente => {
        cliente.pedidos.forEach(p => {
          if(!p.eliminado){
            if(!productos[p.producto]){
              productos[p.producto] = {cantidad: 0, ganancia: 0, costo: p.costo, precio: p.precio};
            }
            productos[p.producto].cantidad += p.cantidad;
            productos[p.producto].ganancia += (p.precio - p.costo) * p.cantidad;
          }
        });
      });
    });
    
    doc.setFontSize(9);
    doc.setFont("courier", "bold");
    doc.text('Producto', 20, y);
    doc.text('Cant', 110, y);
    doc.text('Costo', 135, y);
    doc.text('Precio', 160, y);
    doc.text('Ganancia', 185, y);
    y += 4;
    doc.setFont("courier", "normal");
    doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
    y += 6;
    
    let totalGanancia = 0;
    for(const [nombre, info] of Object.entries(productos)){
      if(y > 260){
        doc.addPage();
        y = 20;
      }
      doc.text(nombre.substring(0, 20), 20, y);
      doc.text(info.cantidad.toString(), 115, y, { align: 'center' });
      doc.text(`$${info.costo}`, 145, y, { align: 'right' });
      doc.text(`$${info.precio}`, 170, y, { align: 'right' });
      doc.text(`$${info.ganancia.toFixed(2)}`, 195, y, { align: 'right' });
      totalGanancia += info.ganancia;
      y += 6;
    }
    
    y += 4;
    doc.setFont("courier", "bold");
    doc.text('=========================================================', 15, y);
    y += 7;
    doc.setFontSize(12);
    doc.text('GANANCIA TOTAL:', 80, y);
    doc.text(`$ ${totalGanancia.toFixed(2)}`, 195, y, { align: 'right' });
    
  } else if(tipo === 'dia'){
    const dia = diaSel.value;
    doc.text(`** REPORTE DEL DIA: ${dia.toUpperCase()} **`, 105, y, { align: 'center' });
    y += 6;
    doc.setFontSize(8);
    doc.text('=========================================================', 15, y);
    y += 10;
    
    let totalDia = 0;
    data[dia].forEach(cliente => {
      doc.setFontSize(9);
      doc.setFont("courier", "bold");
      doc.text(`Cliente: ${cliente.nombre}`, 20, y);
      y += 6;
      doc.setFont("courier", "normal");
      
      cliente.pedidos.forEach(p => {
        if(!p.eliminado){
          const ganancia = (p.precio - p.costo) * p.cantidad;
          totalDia += ganancia;
          doc.text(`  ${p.producto.substring(0, 25)}`, 20, y);
          doc.text(`x${p.cantidad}`, 130, y);
          doc.text(`$${ganancia.toFixed(2)}`, 195, y, { align: 'right' });
          y += 5;
          
          if(y > 260){
            doc.addPage();
            y = 20;
          }
        }
      });
      y += 3;
    });
    
    y += 4;
    doc.setFont("courier", "bold");
    doc.text('=========================================================', 15, y);
    y += 7;
    doc.setFontSize(12);
    doc.text('GANANCIA DEL DIA:', 80, y);
    doc.text(`$ ${totalDia.toFixed(2)}`, 195, y, { align: 'right' });
    
  } else if(tipo === 'semana'){
    doc.text('** REPORTE SEMANAL DE GANANCIAS **', 105, y, { align: 'center' });
    y += 6;
    doc.setFontSize(8);
    doc.text('=========================================================', 15, y);
    y += 10;
    
    let totalSemana = 0;
    const dias = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
    
    dias.forEach(dia => {
      let totalDia = 0;
      data[dia].forEach(cliente => {
        cliente.pedidos.forEach(p => {
          if(!p.eliminado){
            totalDia += (p.precio - p.costo) * p.cantidad;
          }
        });
      });
      
      if(totalDia > 0){
        doc.setFontSize(9);
        doc.setFont("courier", "bold");
        doc.text(dia.toUpperCase(), 20, y);
        doc.text(`$${totalDia.toFixed(2)}`, 195, y, { align: 'right' });
        y += 6;
        totalSemana += totalDia;
        
        if(y > 260){
          doc.addPage();
          y = 20;
        }
      }
    });
    
    y += 4;
    doc.setFont("courier", "bold");
    doc.text('=========================================================', 15, y);
    y += 7;
    doc.setFontSize(12);
    doc.text('GANANCIA SEMANAL:', 80, y);
    doc.text(`$ ${totalSemana.toFixed(2)}`, 195, y, { align: 'right' });
    
  } else if(tipo === 'mas_vendidos'){
    doc.text('** PRODUCTOS MAS VENDIDOS **', 105, y, { align: 'center' });
    y += 6;
    doc.setFontSize(8);
    doc.text('=========================================================', 15, y);
    y += 10;
    
    // Recopilar productos y ordenar por cantidad
    const productos = {};
    Object.values(data).forEach(dia => {
      dia.forEach(cliente => {
        cliente.pedidos.forEach(p => {
          if(!p.eliminado){
            if(!productos[p.producto]){
              productos[p.producto] = {cantidad: 0, totalVenta: 0, ganancia: 0};
            }
            productos[p.producto].cantidad += p.cantidad;
            productos[p.producto].totalVenta += p.precio * p.cantidad;
            productos[p.producto].ganancia += (p.precio - p.costo) * p.cantidad;
          }
        });
      });
    });
    
    // Convertir a array y ordenar por cantidad descendente
    const productosOrdenados = Object.entries(productos)
      .map(([nombre, info]) => ({nombre, ...info}))
      .sort((a, b) => b.cantidad - a.cantidad);
    
    doc.setFontSize(9);
    doc.setFont("courier", "bold");
    doc.text('Rank', 20, y);
    doc.text('Producto', 40, y);
    doc.text('Cant', 115, y);
    doc.text('Venta', 145, y);
    doc.text('Ganancia', 175, y);
    y += 4;
    doc.setFont("courier", "normal");
    doc.text('- - - - - - - - - - - - - - - - - - - - - - - - - - - -', 15, y);
    y += 6;
    
    let totalCantidad = 0;
    let totalVentas = 0;
    let totalGanancia = 0;
    
    productosOrdenados.forEach((prod, index) => {
      if(y > 260){
        doc.addPage();
        y = 20;
      }
      
      doc.setFont("courier", "bold");
      doc.text(`${index + 1}°`, 22, y, { align: 'center' });
      doc.setFont("courier", "normal");
      doc.text(prod.nombre.substring(0, 18), 40, y);
      doc.text(prod.cantidad.toString(), 120, y, { align: 'center' });
      doc.text(`$${prod.totalVenta.toFixed(2)}`, 165, y, { align: 'right' });
      doc.text(`$${prod.ganancia.toFixed(2)}`, 195, y, { align: 'right' });
      
      totalCantidad += prod.cantidad;
      totalVentas += prod.totalVenta;
      totalGanancia += prod.ganancia;
      y += 6;
    });
    
    y += 4;
    doc.setFont("courier", "bold");
    doc.text('=========================================================', 15, y);
    y += 7;
    doc.setFontSize(10);
    doc.text('TOTALES:', 20, y);
    doc.text(`Pzs: ${totalCantidad}`, 80, y);
    doc.text(`Venta: $${totalVentas.toFixed(2)}`, 120, y);
    y += 5;
    doc.setFontSize(12);
    doc.text('GANANCIA TOTAL:', 80, y);
    doc.text(`$ ${totalGanancia.toFixed(2)}`, 195, y, { align: 'right' });
  }
  
  // Pie de página
  y += 10;
  doc.setFontSize(8);
  doc.text('=========================================================', 15, y);
  y += 6;
  doc.setFont("courier", "normal");
  doc.text(`Generado: ${formatearFecha(new Date().toISOString().split('T')[0])}`, 105, y + 2, { align: 'center' });
  y += 4;
  doc.text('=========================================================', 15, y);
  
  const nombreArchivo = `Reporte_${tipo}_${new Date().toISOString().split('T')[0]}.pdf`;
  doc.save(nombreArchivo);
  mostrarToast('✅ Reporte PDF generado');
}

function resetearDia(dia){
  if(confirm(`¿Estás seguro de que deseas eliminar todos los pedidos del día ${dia}? Esta acción no se puede deshacer.`)){
    const data=getData();
    data[dia]=[];
    saveData(data);
    actualizarClientes();
    render();
    alert(`Todos los pedidos del día ${dia} han sido eliminados.`);
  }
}


// Registro del Service Worker para PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('Service Worker registrado'))
      .catch(err => console.log('Error al registrar Service Worker:', err));
  });
}

</script>
